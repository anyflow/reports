version: 1
profile:
  name: tesla-daily-default
  description: Tesla 일일 뉴스 분석 기본 프로필
sources:
  include:
    - reuters.com
    - bloomberg.com
    - cnbc.com
    - wsj.com
    - ft.com
    - electrek.co
    - teslarati.com
  exclude:
    - reddit.com
article_selection:
  max_articles_per_day: 20
  deduplication:
    by_url: true
    by_title_similarity: true
    similarity_threshold: 0.87
  minimum_quality_score: 0.55
classification:
  categories:
    - id: earnings
      label: 실적
    - id: autonomy
      label: 자율주행/FSD
    - id: deliveries
      label: 판매량/인도량
    - id: manufacturing
      label: 생산/공장
    - id: energy
      label: 에너지/배터리
    - id: regulation
      label: 규제/소송/정책
    - id: market_sentiment
      label: 주가/시장심리
    - id: competition
      label: 경쟁사/시장경쟁
priority_rules:
  weights:
    business_impact: 0.30
    product_impact: 0.20
    regulatory_impact: 0.20
    market_signal: 0.15
    execution_risk: 0.15
summary_policy:
  language: ko
  tone: concise-analyst
  top_n: 5
  compare_with_previous_day: true
discussion_policy:
  allow_followup_analysis: true
  answer_grounded_only: true
  cite_article_ids: true
output:
  markdown:
    path_pattern: reports/tesla/{{date}}.md
  json:
    path_pattern: articles/tesla/{{date}}.json
